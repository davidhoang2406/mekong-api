name: Tests

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && echo "run gofmt -w" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: CGO_ENABLED=1 go test -tags=integration ./...
